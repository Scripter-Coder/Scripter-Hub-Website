<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✧ ScripterHub · Status ✧</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0b0b;
      padding: 2rem 1rem;
    }

    /* animated background (reuse) */
    .animated-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: linear-gradient(145deg, #1a1a1a, #2b2b2b);
      background-size: 400% 400%;
      animation: colorPulse 14s ease-in-out infinite alternate;
    }

    @keyframes colorPulse {
      0% { background: #0a0a0a; }
      30% { background: #2e2e2e; }
      60% { background: #b0b0b0; }
      85% { background: #4a4a4a; }
      100% { background: #0a0a0a; }
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .portal {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      background: rgba(10, 10, 10, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 3rem;
      padding: 2rem 1.5rem 2.5rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.02);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.2rem;
      color: #aaa;
      text-decoration: none;
      font-weight: 400;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 4px;
      transition: 0.2s;
    }
    .back-link:hover {
      color: #f0f0f0;
      border-bottom-color: rgba(255,255,255,0.3);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      color: #f0f0f0;
      text-shadow: 0 0 12px rgba(255,255,255,0.15);
      margin-bottom: 1.8rem;
      text-align: center;
      letter-spacing: 1px;
    }
    h1 small {
      font-size: 1rem;
      font-weight: 300;
      color: #aaa;
      display: block;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ---- table style (boxed) ---- */
    .status-grid {
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
    }

    .section-box {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 2.2rem;
      padding: 1.5rem 1.2rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.03);
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #d0d0d0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-bottom: 0.5rem;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title span {
      font-size: 1rem;
      font-weight: 300;
      color: #888;
      margin-left: auto;
    }

    /* two column layout for executors */
    .executor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.4rem 0.8rem;
    }

    .executor-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.3rem 0.2rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.9rem;
      color: #d4d4d4;
    }
    .executor-item .exe-name {
      font-weight: 400;
    }
    .executor-item .exe-status {
      font-weight: 500;
      font-size: 0.8rem;
      padding: 0.1rem 0.8rem;
      border-radius: 30px;
      background: rgba(255,255,255,0.03);
    }
    .executor-item .exe-type {
      font-size: 0.65rem;
      color: #888;
      margin-right: 6px;
      background: rgba(255,255,255,0.02);
      padding: 0.1rem 0.5rem;
      border-radius: 12px;
    }

    .exe-green { color: #66d9a0; }      /* 🟢 */
    .exe-red { color: #f28b82; }        /* 🔴 */
    .exe-blue { color: #7aa9ff; }       /* 🔵 */

    /* script list */
    .script-list {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .script-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0.2rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      font-size: 0.95rem;
      color: #d4d4d4;
      flex-wrap: wrap;
    }
    .script-name {
      font-weight: 500;
      margin-right: 12px;
    }
    .script-status {
      font-weight: 500;
      padding: 0.1rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    /* ---- color classes for status (scripts) ---- */
    .status-working-op { color: #66d9a0; }           /* green aqua */
    .status-experimental { color: #d4b86a; }         /* dark yellow */
    .status-soon { color: #b57edc; }                 /* purple */
    .status-notworking { color: #f28b82; }           /* red */
    .status-working { color: #6fcf97; }              /* green */
    .status-updating { color: #f5b342; }             /* yellow */
    .status-discontinued { color: #5b9bd5; }         /* blue */

    /* small badge for OP */
    .badge-op {
      background: rgba(102, 217, 160, 0.15);
      padding: 0.05rem 0.5rem;
      border-radius: 30px;
      font-size: 0.7rem;
      margin-left: 4px;
      color: #66d9a0;
    }

    @media (max-width: 600px) {
      .portal { padding: 1.2rem 0.8rem; }
      h1 { font-size: 1.6rem; }
      .section-title { font-size: 1.3rem; }
      .executor-grid { grid-template-columns: 1fr; }
      .script-row { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="animated-bg"></div>
  <div class="bg-overlay"></div>

  <div class="portal">

    <!-- back to main (part 1) -->
    <a href="#" class="back-link" id="backLink">⬅ Back to Hub</a>

    <h1>
      📊 SCRIPTS / EXECUTORS STATUS
      <small>ScripterHub · live</small>
    </h1>

    <div class="status-grid">

      <!-- ========== SCRIPTS ========== -->

        <div class="section-title">
          📜 Scripts

        </div>
        <div class="script-list" id="scriptList">
          <!-- injected by JS -->

      <!-- ========== EXECUTORS ========== -->

        <div class="section-title">
          ⚙️ Executors
          <span>all platforms</span>
        </div>
        <div id="executorContainer">
          <!-- injected by JS -->
        </div>
      </div>

    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- SCRIPTS DATA (exactly as provided) ----------
      const scriptsData = [
        { name: "99 Nights In The Forest", status: "Working | OP ⭐" },

        { name: "Blade Ball", status: "Discontinued" },

        { name: "Survive On A Raft", status: "Soon" },
        { name: "Tenna 3D Blast: Spamton's Island", status: "Soon" },
        { name: "Tower Defense Simulator X", status: "Soon" },
        { name: "Trollge Universal Incident", status: "Working (EXPERIMENTAL)" },
        { name: "Trollge Universe:Aftermath", status: "Soon" },
        { name: "Universal Script Hub", status: "Working" },
        { name: "Violence District", status: "Working (EXPERIMENTAL)" }
      ];

      // ---------- HELPER: status -> color class + display ----------
      function getStatusClass(status) {
        const s = status.toLowerCase();
        if (s.includes('op') || s.includes('⭐')) return 'status-working-op';
        if (s.includes('experimental')) return 'status-experimental';
        if (s.includes('soon')) return 'status-soon';
        if (s.includes('not working')) return 'status-notworking';
        if (s.includes('working')) return 'status-working';
        if (s.includes('updating')) return 'status-updating';
        if (s.includes('discontinued')) return 'status-discontinued';
        return ''; // fallback
      }

      // render scripts
      function renderScripts() {
        const container = document.getElementById('scriptList');
        let html = '';
        scriptsData.forEach(item => {
          const statusClass = getStatusClass(item.status);
          let displayStatus = item.status;
          // if it has OP badge, keep it but we'll also show badge
          const hasOp = item.status.includes('OP ⭐');
          let cleanStatus = item.status.replace(' | OP ⭐', '').trim();
          if (hasOp) {
            displayStatus = cleanStatus + ' <span class="badge-op">⭐ OP</span>';
          } else {
            displayStatus = item.status;
          }
          html += `
            <div class="script-row">
              <span class="script-name">${item.name}</span>
              <span class="script-status ${statusClass}">${displayStatus}</span>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // ---------- EXECUTORS DATA (grouped) ----------
      const execGroups = [
        {
          label: 'Windows Executors',

            { name: 'Velocity', type: 'Free + Key', status: '🔴' },
            { name: 'Seliware', type: 'Paid', status: '🟢' },
            { name: 'Swift', type: 'Free + Key', status: '🔴' },
            { name: 'Valex', type: 'Free + Key', status: '🟢' },
            { name: 'Potassium', type: 'Paid', status: '🟢' },
            { name: 'Solara', type: 'Free', status: '🟢' },
            { name: 'Xeno', type: 'Free', status: '🟢' },
            { name: 'Bunni.fun', type: 'Free + Key', status: '🔴' },
            { name: 'Sirhurt', type: 'Paid', status: '🟢' },
            { name: 'Lovreware', type: 'Paid', status: '🔴' },
            { name: 'Drift', type: 'Free + Key', status: '🟢' },
            { name: 'JJSploit', type: 'Free', status: '🟢' },
            { name: 'LX63', type: 'Free', status: '🔴' },
            { name: 'Pluto', type: 'Free + Key', status: '🟢' },
            { name: 'ChocoSploit', type: 'Paid', status: '🟢' },
            { name: 'Ronix', type: 'Free + Key', status: '🔴' },
            { name: 'Cryptic', type: 'Paid', status: '🟢' },
            { name: 'Cosmic', type: 'Paid', status: '🔴' },
            { name: 'Isaeva', type: 'Paid', status: '🔴' },
            { name: 'Madium', type: 'Free', status: '🟢' }
          ]
        },
        {
          label: 'Mac Executors',
          icon: '🍏',
          items: [
            { name: 'Hydrogen', type: 'Free + Key', status: '🔴' },
            { name: 'Macsploit', type: 'Paid', status: '🔴' },
            { name: 'Cryptic', type: 'Free + Key', status: '🔴' },
            { name: 'Ronix', type: 'Free + Key', status: '🔴' },
            { name: 'Opiumware', type: 'Free', status: '🔴' }
          ]
        },
        {
          label: 'Android Executors',
          icon: '🤖',
          items: [
            { name: 'Delta', type: 'Free + Key', status: '🔴' },

            { name: 'Vega X', type: 'Free + Key', status: '🟢' },
            { name: 'Punk X', type: 'Free + Key', status: '🟢' }
          ]
        },
        {

            { name: 'Delta', type: 'Free + Key', status: '🔴' },
            { name: 'Ronix', type: 'Free + Key', status: '🔴' }
          ]
        },
        {
          label: 'Windows External Executors',
          icon: '🔄',
          items: [
            { name: 'Ronin', type: 'Paid', status: '🔴' },
            { name: 'Serotonin', type: 'Paid', status: '🟢' },

            { name: 'Photon', type: 'Paid', status: '🟢' },
            { name: 'Valex External', type: 'Free + Key', status: '🟢' },
            { name: 'DX9WARE V2', type: 'Paid', status: '🟢' },
            { name: 'Yerba', type: 'Paid', status: '🟢' },
            { name: 'RbxCli', type: 'Paid', status: '🟢' }
          ]
        },
        {
          label: 'Other Executors',
          icon: '⚡',
          items: [
            { name: 'VeilX', type: 'Free', status: '🔴' },
            { name: 'NullX', type: 'Free [SOON]', status: '🔴' },
            { name: 'Krnl', type: 'Free + Key', status: '🔵' },
            { name: 'Swift', type: 'Free + Key [FULLY DOWN]', status: '🔴' },
            { name: 'Nihon', type: 'Free + Key', status: '🔵' }
          ]
        }
      ];

      function renderExecutors() {
        const container = document.getElementById('executorContainer');
        let html = '';
        execGroups.forEach(group => {
          html += `<div style="margin-bottom: 1.6rem;">`;
          html += `<div style="display:flex; align-items:center; gap:8px; margin-bottom:0.4rem; color:#c0c0c0; font-weight:500; font-size:1.1rem; border-bottom:1px solid rgba(255,255,255,0.04); padding-bottom:4px;">
            <span>${group.icon}</span> ${group.label}
          </div>`;
          html += `<div class="executor-grid">`;
          group.items.forEach(exe => {
            let statusClass = '';
            if (exe.status === '🟢') statusClass = 'exe-green';
            else if (exe.status === '🔴') statusClass = 'exe-red';
            else if (exe.status === '🔵') statusClass = 'exe-blue';
            html += `
              <div class="executor-item">
                <span class="exe-name">${exe.name}</span>
                <span>
                  <span class="exe-type">${exe.type}</span>
                  <span class="exe-status ${statusClass}">${exe.status}</span>
                </span>
              </div>
            `;
          });
          html += `</div></div>`;
        });
        container.innerHTML = html;
      }

      // ---------- BACK BUTTON (to part 1) ----------
      document.getElementById('backLink').addEventListener('click', function(e) {
        e.preventDefault();
        alert('🔙 Return to main hub (part 1). In a full site, this would navigate back.');

        // window.location.href = 'index.html';

      renderScripts();

  </script>

</body>
</html>
